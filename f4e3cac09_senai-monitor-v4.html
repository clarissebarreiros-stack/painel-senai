<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENAi Monitor · DR Alagoas</title>
<style>
:root {
  --senai-blue: #164194;
  --senai-orange: #E84910;
  --senai-light-blue: #008BD2;
  --senai-bg: #f1f5f9;
  --senai-white: #ffffff;
  --senai-text: #1e293b;
  --senai-muted: #64748b;
  --senai-border: #e2e8f0;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: var(--senai-bg); color: var(--senai-text); display: flex; min-height: 100vh; font-size: 14px; }
a { color: var(--senai-blue); text-decoration: none; }
a:hover { text-decoration: underline; }
button, select, input { font-family: inherit; }

/* SIDEBAR */
.sidebar { width: 230px; min-height: 100vh; background: #ffffff; display: flex; flex-direction: column; position: fixed; left: 0; top: 0; bottom: 0; z-index: 100; border-right: 1px solid #e2e8f0; }
.sidebar-logo { padding: 20px 12px 16px; border-bottom: 1px solid #e2e8f0; text-align: center; }
.logo-mark { font-size: 28px; font-weight: 900; font-style: italic; letter-spacing: 1px; line-height: 1; }
.logo-sena { color: #ffffff; }
.logo-i { color: var(--senai-orange); }
.logo-sub { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 3px; }
.nav { padding: 14px 0; flex: 1; overflow-y: auto; }
.nav-label { padding: 6px 18px; font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-top: 8px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 11px 18px; color: #475569; font-size: 13px; font-weight: 500; cursor: pointer; border-left: 3px solid transparent; transition: all 0.15s; border-radius: 0 8px 8px 0; margin-right: 10px; }
.nav-item:hover { background: #f1f5f9; color: var(--senai-blue); }
.nav-item.active { color: var(--senai-blue); background: #eff6ff; border-left-color: var(--senai-orange); font-weight: 700; }
.nav-icon { font-size: 15px; width: 20px; text-align: center; }
.sidebar-footer { padding: 14px 18px; border-top: 1px solid #e2e8f0; font-size: 10px; color: #94a3b8; }

/* MAIN */
.main { margin-left: 230px; flex: 1; padding: 28px; max-width: 1400px; }
.page-header { margin-bottom: 22px; }
.page-title { font-size: 20px; font-weight: 700; color: var(--senai-blue); padding-left: 12px; border-left: 4px solid var(--senai-orange); line-height: 1.2; }
.page-sub { font-size: 12px; color: var(--senai-muted); padding-left: 16px; margin-top: 3px; }
.breadcrumb { font-size: 11px; color: var(--senai-muted); padding-left: 16px; margin-top: 2px; }

/* FILTER BAR */
.filter-bar { display: flex; flex-wrap: wrap; gap: 10px; background: var(--senai-white); border-radius: 10px; padding: 12px 16px; margin-bottom: 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); align-items: center; }
.flbl { font-size: 12px; color: var(--senai-muted); font-weight: 600; }
.cache-info { font-size: 11px; color: var(--senai-muted); margin-left: auto; }
select { padding: 6px 10px; border: 1px solid var(--senai-border); border-radius: 6px; font-size: 13px; background: #f8fafc; color: var(--senai-text); outline: none; cursor: pointer; }
input { padding: 6px 10px; border: 1px solid var(--senai-border); border-radius: 6px; font-size: 13px; background: #f8fafc; color: var(--senai-text); outline: none; }
input:focus, select:focus { border-color: var(--senai-blue); }

/* BUTTONS */
.btn { padding: 7px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 5px; }
.btn-primary { background: var(--senai-blue); color: #fff; }
.btn-primary:hover { background: #1a50b8; }
.btn-orange { background: var(--senai-orange); color: #fff; }
.btn-orange:hover { background: #cc3d0d; }
.btn-outline { background: transparent; color: var(--senai-blue); border: 1.5px solid var(--senai-blue); }
.btn-outline:hover { background: #eef2ff; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-danger { background: #ef4444; color: #fff; }
.btn-disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; }
.btn-ghost { background: transparent; color: var(--senai-muted); border: 1px solid var(--senai-border); }
.btn-ghost:hover { background: #f8fafc; }

/* KPI CARDS */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; margin-bottom: 22px; }
.kpi { background: var(--senai-white); border-radius: 10px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); border-top: 3px solid var(--senai-muted); position: relative; overflow: hidden; }
.kpi.kpi-blue { border-top-color: var(--senai-blue); }
.kpi.kpi-orange { border-top-color: var(--senai-orange); }
.kpi.kpi-light { border-top-color: var(--senai-light-blue); }
.kpi.kpi-green { border-top-color: #22c55e; }
.kpi.kpi-red { border-top-color: #ef4444; }
.kpi.kpi-yellow { border-top-color: #eab308; }
.kpi-label { font-size: 10px; color: var(--senai-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; margin-bottom: 6px; }
.kpi-value { font-size: 32px; font-weight: 700; color: var(--senai-text); line-height: 1; }
.kpi-sub { font-size: 11px; color: var(--senai-muted); margin-top: 5px; }

/* LEVEL MINI CARDS */
.level-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 22px; }
.level-card { background: var(--senai-white); border-radius: 10px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); border-left: 4px solid var(--senai-muted); }
.level-card.lc-blue { border-left-color: var(--senai-blue); }
.level-card.lc-light { border-left-color: var(--senai-light-blue); }
.level-card.lc-orange { border-left-color: var(--senai-orange); }
.level-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--senai-muted); margin-bottom: 8px; }
.level-count { font-size: 24px; font-weight: 700; color: var(--senai-text); }
.level-stats { display: flex; gap: 12px; margin-top: 6px; font-size: 11px; color: var(--senai-muted); }

/* CARDS */
.card { background: var(--senai-white); border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); margin-bottom: 18px; }
.card-hd { padding: 13px 16px; border-bottom: 1px solid var(--senai-border); display: flex; align-items: center; justify-content: space-between; }
.card-title { font-size: 13px; font-weight: 700; color: var(--senai-blue); }
.card-body { padding: 14px 16px; }

/* TABLES */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 700; color: var(--senai-muted); text-transform: uppercase; background: #f8fafc; border-bottom: 1px solid var(--senai-border); cursor: pointer; user-select: none; white-space: nowrap; }
th:hover { background: #eef2ff; color: var(--senai-blue); }
td { padding: 9px 12px; border-top: 1px solid #f8fafc; vertical-align: middle; }
tr:hover td { background: #fafafa; }
tr.row-delayed td { background: #fff7ed; }
tr.row-delayed:hover td { background: #ffedd5; }

/* BADGES */
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.b-green { background: #dcfce7; color: #15803d; }
.b-red { background: #fee2e2; color: #991b1b; }
.b-yellow { background: #fef9c3; color: #854d0e; }
.b-blue { background: #dbeafe; color: #1e40af; }
.b-orange { background: #ffedd5; color: #9a3412; }
.b-gray { background: #f1f5f9; color: #475569; }
.b-purple { background: #f3e8ff; color: #7e22ce; }
.b-teal { background: #ccfbf1; color: #0f766e; }

/* PROGRESS */
.pbar-wrap { margin: 3px 0; }
.pbar-top { display: flex; justify-content: space-between; font-size: 11px; color: var(--senai-muted); margin-bottom: 3px; }
.pbar-top span:last-child { font-weight: 700; }
.pbar-bg { height: 5px; background: var(--senai-border); border-radius: 3px; overflow: hidden; }
.pbar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }

/* ALERTS */
.alert { padding: 10px 14px; border-radius: 7px; font-size: 13px; margin-bottom: 12px; }
.alert-err { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
.alert-ok { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
.alert-warn { background: #fef9c3; color: #854d0e; border: 1px solid #fde047; }
.alert-info { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }

/* INSIGHT CARDS */
.insight { border-radius: 8px; padding: 10px 14px; font-size: 13px; display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
.i-green { background: #dcfce7; color: #15803d; border-left: 4px solid #22c55e; }
.i-yellow { background: #fef9c3; color: #854d0e; border-left: 4px solid #eab308; }
.i-orange { background: #ffedd5; color: #9a3412; border-left: 4px solid var(--senai-orange); }
.i-red { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
.i-blue { background: #dbeafe; color: #1e40af; border-left: 4px solid var(--senai-blue); }

/* EMPTY STATE */
.empty { text-align: center; padding: 48px 24px; color: var(--senai-muted); }
.empty-ico { font-size: 48px; margin-bottom: 12px; }
.empty-title { font-size: 15px; font-weight: 600; color: var(--senai-text); margin-bottom: 6px; }
.empty-text { font-size: 13px; color: var(--senai-muted); max-width: 360px; margin: 0 auto 14px; }

/* AVATAR */
.avatar { border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; flex-shrink: 0; overflow: hidden; }

/* LOADING */
.loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.85); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
.loading-spinner { width: 44px; height: 44px; border: 4px solid var(--senai-border); border-top-color: var(--senai-blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
.loading-msg { font-size: 14px; color: var(--senai-blue); font-weight: 600; }
@keyframes spin { to { transform: rotate(360deg); } }

/* GOVERNANCE */
.gov-score-card { background: var(--senai-white); border-radius: 10px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); margin-bottom: 18px; display: flex; align-items: center; gap: 24px; }
.gov-score-circle { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: #fff; flex-shrink: 0; }
.gov-badges { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.gov-section { margin-bottom: 8px; }
.gov-section-hd { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: #f8fafc; border: 1px solid var(--senai-border); border-radius: 8px; cursor: pointer; user-select: none; }
.gov-section-hd:hover { background: #eef2ff; }
.gov-section-title { font-size: 13px; font-weight: 700; color: var(--senai-text); flex: 1; }
.gov-section-body { border: 1px solid var(--senai-border); border-top: none; border-radius: 0 0 8px 8px; overflow: hidden; }

/* COLLAB CARDS */
.collab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; margin-bottom: 18px; }
.collab-card { background: var(--senai-white); border-radius: 10px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); display: flex; align-items: flex-start; gap: 12px; }
.collab-info { flex: 1; min-width: 0; }
.collab-name { font-size: 13px; font-weight: 700; color: var(--senai-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.collab-stats { font-size: 11px; color: var(--senai-muted); margin-top: 2px; }
.collab-bars { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }

/* MONITORING TREE */
.tree-item { border-left: 2px solid var(--senai-border); margin-left: 16px; padding-left: 12px; margin-top: 4px; }
.tree-root { margin-left: 0; border-left: none; padding-left: 0; }
.item-row { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 7px; cursor: pointer; }
.item-row:hover { background: #f8fafc; }
.item-toggle { font-size: 10px; color: var(--senai-muted); width: 14px; flex-shrink: 0; }
.item-title { flex: 1; font-size: 13px; font-weight: 500; color: var(--senai-text); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.item-title a { color: var(--senai-text); }
.item-title a:hover { color: var(--senai-blue); text-decoration: none; }

/* TABS (dentro de páginas) */
.tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 14px; }
.tab { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; border: 1.5px solid var(--senai-border); cursor: pointer; background: var(--senai-white); color: var(--senai-muted); transition: all 0.15s; }
.tab:hover { border-color: var(--senai-blue); color: var(--senai-blue); }
.tab.active { background: var(--senai-blue); color: #fff; border-color: var(--senai-blue); }

/* FORM */
.form-group { margin-bottom: 14px; }
.form-lbl { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 5px; }
.form-input { width: 100%; padding: 8px 12px; border: 1.5px solid var(--senai-border); border-radius: 7px; font-size: 13px; outline: none; }
.form-input:focus { border-color: var(--senai-blue); }

/* TWO COL */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 18px; }
@media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } .level-grid { grid-template-columns: 1fr; } }

/* PLACEHOLDER PAGE */
.placeholder-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; text-align: center; gap: 14px; }
.placeholder-icon { font-size: 64px; }
.placeholder-title { font-size: 20px; font-weight: 700; color: var(--senai-blue); }
.placeholder-sub { font-size: 14px; color: var(--senai-muted); max-width: 440px; line-height: 1.6; }

/* MISC */
.sep { height: 1px; background: var(--senai-border); margin: 14px 0; }
.text-muted { color: var(--senai-muted); }
.text-sm { font-size: 12px; }
.fw700 { font-weight: 700; }
.flex { display: flex; align-items: center; gap: 8px; }
.ml-auto { margin-left: auto; }
</style>

<script>
// ============================================================
// STATE
// ============================================================
var S = {
  page: 'dashboard',
  token: (function(){ try { return localStorage.getItem('azurePAT') || ''; } catch(e) { return ''; } })(),
  iterations: [],
  workItems: [],
  year: '2026',
  loading: false,
  loadingMsg: null,
  error: null,
  cache: null,
  cacheYear: null,
  cacheTs: 0,
  holidays: (function(){ try { return JSON.parse(localStorage.getItem('holidays') || '[]'); } catch(e) { return []; } })(),
  dashArea: 'Todas', dashLevel: 'Todos',
  monLevel: 'Todos', monArea: 'Todas', monStatus: 'Todos',
  monSort: { col: 'id', dir: 'asc' },
  collabName: '__all__', collabArea: 'Todas', collabType: 'Todos',
  govArea: 'Todas', govSection: {},
  expanded: {},
  patInput: '', patMsg: null,
  holDate: '', holName: '', holYear: '2026'
};

// ============================================================
// CONSTANTS
// ============================================================
var ORG = 'SENAIAlagoas';
var BASE = 'https://dev.azure.com/' + ORG;
var PROXY = 'https://base44.app/api/apps/6a1495babdc5ca8806ca7cd6/functions/azureProxy';

function proxyFetch(azureUrl, tok, opts) {
  var options = opts || {};
  var headers = { 'X-Azure-Pat': tok, 'X-Azure-Url': azureUrl, 'Content-Type': 'application/json' };
  return fetch(PROXY, {
    method: options.method || 'GET',
    headers: headers,
    body: options.body || undefined
  });
}

// Converte "YYYY-MM-DD" para Date local (evita interpretação UTC do new Date("YYYY-MM-DD"))
function localDate(s) {
  if (!s) return null;
  var p = s.substring(0,10).split('-');
  return new Date(+p[0], +p[1]-1, +p[2]);
}

// ── Capacidade semanal por colaborador (horas semanais) ──────────────
var WEEKLY_HOURS = {
  'Eduardo':  30,
  'Pedro':    30,
  'Thiago':   44,
  'Gustavo':  44,
  'Mychella': 44,
  'Weverton': 44,
  'Ygor':     44,
  'Fernando': 44,
  'Andrea':   44,
  'Andréa':   44
};
var DEFAULT_WEEKLY_HOURS = 40;

// Colaboradores excluídos de todos os cálculos
var EXCLUDED_COLLABS = ['Ariane'];

// Retorna true se colaborador deve ser excluído
function isExcluded(displayName) {
  if (!displayName) return false;
  return EXCLUDED_COLLABS.some(function(ex){ return displayName.toLowerCase().includes(ex.toLowerCase()); });
}

// Retorna horas semanais de um colaborador (por primeiro nome)
function getWeeklyHours(displayName) {
  if (!displayName) return DEFAULT_WEEKLY_HOURS;
  var first = displayName.trim().split(' ')[0];
  for (var key in WEEKLY_HOURS) {
    if (key.toLowerCase() === first.toLowerCase()) return WEEKLY_HOURS[key];
  }
  return DEFAULT_WEEKLY_HOURS;
}

// Retorna capacidade de horas numa sprint baseado nas semanas do período
function getSprintCapacity(displayName, startDate, finishDate) {
  if (!startDate || !finishDate) return 40;
  var sd = localDate(startDate), fd = localDate(finishDate);
  // Contar dias úteis
  var cur = new Date(sd), wd = 0;
  fd.setHours(23,59,59,0);
  while (cur <= fd) {
    var d = cur.getDay(); if (d !== 0 && d !== 6) wd++;
    cur.setDate(cur.getDate() + 1);
  }
  var weeks = wd / 5; // semanas equivalentes
  var whrs = getWeeklyHours(displayName);
  return Math.round(weeks * whrs);
}

// Proxy fetch — roteia chamadas Azure pelo backend para evitar CORS



var ABASE = BASE + '/b007cc3b-1a92-421b-a0ce-8a9251e102da';
var DEVOPS = BASE + '/SENAI/_workitems/edit/';
var DONE   = ['Concluído','Closed','Done'];
var PAUSED = ['Pausado','On Hold','Paused'];
var CANCEL = ['Cancelado','Removed','Cancelled'];

// ============================================================
// UTILS
// ============================================================
function el(tag, cls, html) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}
function txt(s) { return document.createTextNode(String(s == null ? '' : s)); }
function ap(p) {
  for (var i = 1; i < arguments.length; i++) {
    var c = arguments[i];
    if (c == null || c === false) continue;
    if (typeof c === 'string' || typeof c === 'number') p.appendChild(txt(c));
    else p.appendChild(c);
  }
  return p;
}
function pct(a, b) { return b ? Math.round(a / b * 100) : 0; }
function fmt(d) {
  if (!d) return '—';
  var dt = new Date(d);
  return ('0'+dt.getDate()).slice(-2)+'/'+('0'+(dt.getMonth()+1)).slice(-2)+'/'+dt.getFullYear();
}
function auth(t) { return 'Basic ' + btoa(':' + t); }
function timeAgo(ts) {
  if (!ts) return '';
  var mins = Math.round((Date.now() - ts) / 60000);
  if (mins < 1) return 'agora';
  if (mins < 60) return 'há ' + mins + ' min';
  return 'há ' + Math.round(mins/60) + 'h';
}
function avatarBg(name) {
  var pal = ['#164194','#008BD2','#E84910','#7c3aed','#0891b2','#15803d','#b45309'];
  var h = 0;
  for (var i = 0; i < (name||'').length; i++) h = (name||'').charCodeAt(i) + ((h<<5) - h);
  return pal[Math.abs(h) % pal.length];
}
function initials(name) {
  return ((name||'').split(' ').filter(Boolean).slice(0,2).map(function(w){return w[0];}).join('')).toUpperCase() || '?';
}

// ============================================================
// DATA FUNCTIONS
// ============================================================
function getArea(areaPath) {
  if (!areaPath) return 'Outro';
  if (areaPath.indexOf('Controladoria') >= 0) return 'Controladoria';
  if (areaPath.indexOf('Educação Profissional') >= 0 || areaPath.indexOf('Educacao Profissional') >= 0) return 'Educação Profissional';
  return 'Outro';
}

function getLevel(tags) {
  if (!tags) return 'Sem tag';
  if (tags.indexOf('Estratégico') >= 0 || tags.indexOf('Estrategico') >= 0) return 'Estratégico';
  if (tags.indexOf('Tático') >= 0 || tags.indexOf('Tatico') >= 0) return 'Tático';
  if (tags.indexOf('Operacional') >= 0) return 'Operacional';
  if (tags.indexOf('Plano de trabalho') >= 0 || tags.indexOf('Plano de Trabalho') >= 0) return 'Plano de Trabalho';
  if (tags.indexOf('Apoio a gestão') >= 0 || tags.indexOf('Apoio à gestão') >= 0 || tags.indexOf('Apoio a gestao') >= 0) return 'Apoio à Gestão';
  if (tags.indexOf('T.I.') >= 0 || tags.indexOf('TI') >= 0) return 'T.I.';
  return 'Sem tag';
}

function getLevelBadgeClass(level) {
  if (level === 'Estratégico') return 'b-blue';
  if (level === 'Tático') return 'b-teal';
  if (level === 'Operacional') return 'b-orange';
  if (level === 'Plano de Trabalho') return 'b-purple';
  if (level === 'Apoio à Gestão') return 'b-gray';
  if (level === 'T.I.') return 'b-teal';
  return 'b-red';
}

function isTask(type)   { return type==='Tarefa'||type==='Task'; }
function isPlan(type)   { return type==='Plano de Ação'||type==='Feature'; }
function isAction(type) { return type==='Ação'||type==='Product Backlog Item'; }
function isStale(item, days) {
  days = days || 7;
  var changed = item.fields['System.ChangedDate'];
  if (!changed) return false;
  return (new Date() - new Date(changed)) / (1000*60*60*24) > days;
}

function isDone(s) { return DONE.indexOf(s) >= 0; }
function isPaused(s) { return PAUSED.indexOf(s) >= 0; }
function isCancel(s) { return CANCEL.indexOf(s) >= 0; }

function getIter(ip) {
  return S.iterations.filter(function(i) {
    return i.path === ip || i.name === (ip||'').split('\\').pop();
  })[0];
}

function isDelayed(item) {
  var s = item.fields['System.State'] || '';
  if (isDone(s) || isPaused(s) || isCancel(s)) return false;
  var iter = getIter(item.fields['System.IterationPath'] || '');
  return !!(iter && iter.finishDate && localDate(iter.finishDate) < new Date());
}

function govIssues(item) {
  var f = item.fields;
  var issues = [];
  if (!f['System.Parent'] || f['System.Parent'] === 0) issues.push('Sem parent');
  if (!(f['System.Tags'] || '').trim()) issues.push('Sem tag');
  var ip = f['System.IterationPath'] || '';
  if (ip === 'SENAI' || ip.indexOf('Sprint') < 0) issues.push('Sem sprint');
  if (!f['System.AssignedTo'] || !f['System.AssignedTo'].displayName) issues.push('Sem responsável');
  return issues;
}

function calcExec(tasks) {
  if (!tasks.length) return 0;
  return pct(tasks.filter(function(t){return isDone(t.fields['System.State']||'');}).length, tasks.length);
}

function calcConf(tasks) {
  var done = tasks.filter(function(t){return isDone(t.fields['System.State']||'');});
  if (!done.length) return 0;
  return pct(done.filter(function(t){
    var cd = t.fields['Microsoft.VSTS.Common.StateChangeDate'];
    var iter = getIter(t.fields['System.IterationPath']||'');
    return !iter || !cd || new Date(cd) <= localDate(iter.finishDate);
  }).length, done.length);
}

function getChildren(parentId, items) {
  return items.filter(function(w){ return w.fields['System.Parent'] === parentId; });
}

function getAllDescendantTasks(item, items) {
  var result = [];
  var stack = [item.fields['System.Id']];
  var visited = {};
  while (stack.length) {
    var id = stack.pop();
    if (visited[id]) continue;
    visited[id] = true;
    var children = getChildren(id, items);
    children.forEach(function(c){
      var t = c.fields['System.WorkItemType'];
      if (t === 'Tarefa' || t === 'Task') result.push(c);
      else stack.push(c.fields['System.Id']);
    });
  }
  return result;
}

function workDays(s, e) {
  if (!s || !e) return 0;
  var hSet = {};
  S.holidays.forEach(function(h){ hSet[h.date] = 1; });
  var count = 0, cur = new Date(s), end = new Date(e);
  while (cur <= end) {
    var d = cur.getDay(), ds = cur.toISOString().slice(0,10);
    if (d !== 0 && d !== 6 && !hSet[ds]) count++;
    cur.setDate(cur.getDate() + 1);
  }
  return count;
}

function exportCSV(items) {
  var rows = [['ID','Tipo','Título','Área','Nível','Sprint','Estado','Responsável']];
  items.forEach(function(w){
    var f = w.fields;
    var iter = getIter(f['System.IterationPath']||'');
    rows.push([
      f['System.Id'],
      f['System.WorkItemType'],
      '"' + (f['System.Title']||'').replace(/"/g,'""') + '"',
      getArea(f['System.AreaPath']),
      getLevel(f['System.Tags']||''),
      iter ? iter.name : (f['System.IterationPath']||''),
      f['System.State'],
      (f['System.AssignedTo']&&f['System.AssignedTo'].displayName)||''
    ]);
  });
  var csv = rows.map(function(r){return r.join(',');}).join('\n');
  var blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'senai-monitor-export.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function renderLoading() {

async function fetchIters(tok) {
  setLoadingMsg('Carregando sprints...');
  var r = await proxyFetch(ABASE + '/_apis/work/teamsettings/iterations?$expand=attributes&api-version=7.0', tok);
  if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
  var d = await r.json();
  return (d.value||[]).map(function(i){
    // Normalizar para YYYY-MM-DD (remover fuso horário para comparação por data local)
    function normDate(s) { return s ? s.substring(0,10) : null; }
    return {id:i.id, name:i.name, path:i.path||i.name,
      startDate: normDate(i.attributes&&i.attributes.startDate),
      finishDate: normDate(i.attributes&&i.attributes.finishDate)};
  });
}

async function fetchItems(tok, year, force) {
  if (!force && S.cache && S.cacheYear === year && Date.now() - S.cacheTs < 300000) return S.cache;
  setLoadingMsg('Consultando Azure DevOps...');
  var wiql = {query:"SELECT [System.Id] FROM WorkItems WHERE [System.TeamProject]='SENAI' AND [System.AreaPath] UNDER 'SENAI' AND [System.State] NOT IN ('Removido','Cancelled','Cancelado','Removed') ORDER BY [System.Id]"};
  var wr = await proxyFetch(ABASE + '/_apis/wit/wiql?api-version=7.0', tok, {method:'POST',body:JSON.stringify(wiql)});
  if (!wr.ok) throw new Error('WIQL ' + wr.status);
  var wd = await wr.json();
  var ids = (wd.workItems||[]).map(function(w){return w.id;});
  if (!ids.length) return [];
  var fields = ['System.Id','System.Title','System.WorkItemType','System.State','System.AssignedTo','System.Tags','System.AreaPath','System.IterationPath','System.Parent','Microsoft.VSTS.Scheduling.RemainingWork','Microsoft.VSTS.Common.StateChangeDate','System.CreatedDate','System.ChangedDate','Microsoft.VSTS.Scheduling.DueDate'];
  var items = [];
  for (var i = 0; i < ids.length; i += 200) {
    setLoadingMsg('Carregando work items (' + Math.min(i+200, ids.length) + '/' + ids.length + ')...');
    var br = await proxyFetch(BASE + '/_apis/wit/workitemsbatch?api-version=7.0', tok, {method:'POST',body:JSON.stringify({ids:ids.slice(i,i+200),fields:fields})});
    if (!br.ok) throw new Error('Batch ' + br.status);
    var bd = await br.json();
    items = items.concat(bd.value||[]);
  }
  S.cache = items; S.cacheYear = year; S.cacheTs = Date.now();
  return items;
}

async function loadData(tok, force) {
  var t = tok || S.token;
  if (!t) { S.error = 'Configure o PAT em Configurações.'; render(); return; }
  S.loading = true; S.error = null; render();
  try {
    setLoadingMsg('Conectando ao Azure DevOps...');
    S.iterations = await fetchIters(t);
    var rawItems = await fetchItems(t, S.year, force);
    // Excluir colaboradores da lista de exclusão
    S.workItems = rawItems.filter(function(w){
      var a = w.fields['System.AssignedTo'];
      if (!a || !a.displayName) return true;
      return !isExcluded(a.displayName);
    });
  } catch(e) { S.error = 'Erro ao carregar: ' + e.message; }
  S.loading = false; setLoadingMsg(null); render();
}

function buildInsights(allWis, curIter, sprintWis, spDone, spDelayed, spStale) {
  var ins = [];
  var today = new Date(); today.setHours(0,0,0,0);

  if (!curIter || !sprintWis.length) {
    ins.push({cls:'i-yellow',ico:'⚠',text:'Nenhum dado de sprint atual disponível para gerar insights.'});
    return ins;
  }

  var spTotal = sprintWis.length;
  var spActive = sprintWis.filter(function(w){ var s=w.fields['System.State']||''; return !isDone(s)&&!isPaused(s)&&!isCancel(s); });

  // ── Calcular dias decorridos / totais da sprint ──────────
  function workDaysBetween2(sd, fd) {
    var cur=new Date(sd); cur.setHours(0,0,0,0);
    var end=new Date(fd); end.setHours(23,59,59,0);
    var n=0; while(cur<=end){var d=cur.getDay();if(d!==0&&d!==6)n++;cur.setDate(cur.getDate()+1);}
    return n;
  }
  var totalDays = workDaysBetween2(curIter.startDate, curIter.finishDate);
  var elapsedDays = workDaysBetween2(curIter.startDate, today);
  var pctTime = totalDays ? Math.round(elapsedDays/totalDays*100) : 0;
  var pctExec = spTotal ? Math.round(spDone.length/spTotal*100) : 0;
  var sprintName = curIter.name;

  // ── VERDE: progresso positivo ─────────────────────────────
  if (spDone.length > 0 && pctExec >= pctTime) {
    ins.push({cls:'i-green',ico:'🟢',text:'A equipe concluiu '+spDone.length+' item(ns) na '+sprintName+' — ritmo à frente do tempo decorrido ('+pctExec+'% exec vs '+pctTime+'% do tempo).'});
  }

  // Colaborador que concluiu tudo
  var collabComplete = {};
  var collabTotal = {};
  sprintWis.forEach(function(w){
    var a=w.fields['System.AssignedTo']; if(!a||!a.displayName) return;
    var name=a.displayName;
    collabTotal[name]=(collabTotal[name]||0)+1;
    if(isDone(w.fields['System.State']||'')) collabComplete[name]=(collabComplete[name]||0)+1;
  });
  Object.keys(collabTotal).forEach(function(name){
    if(collabTotal[name]>0 && collabComplete[name]===collabTotal[name]) {
      ins.push({cls:'i-green',ico:'✅',text:name+' concluiu todos os '+collabTotal[name]+' item(ns) planejados para a '+sprintName+'.'});
    }
  });

  if (spTotal > 0 && pctExec >= 60) {
    var fd2 = localDate(curIter.finishDate); fd2.setHours(23,59,59,0);
    var remaining = workDaysBetween2(today, curIter.finishDate);
    ins.push({cls:'i-green',ico:'📈',text:pctExec+'% dos itens da '+sprintName+' já entregues com '+remaining+' dia(s) útil(is) restante(s).'});
  }

  // ── AMARELO: atenção ─────────────────────────────────────
  if (pctTime - pctExec > 20) {
    ins.push({cls:'i-yellow',ico:'⚠',text:'Sprint em risco: '+pctTime+'% do tempo decorrido mas apenas '+pctExec+'% dos itens concluídos na '+sprintName+'.'});
  }

  // Colaboradores com itens parados
  spStale.forEach(function(w){
    var a=w.fields['System.AssignedTo']; if(!a||!a.displayName) return;
    ins.push({cls:'i-yellow',ico:'⏸',text:a.displayName+' tem item parado há mais de 7 dias sem movimentação: #'+w.fields['System.Id']+' · '+(w.fields['System.Title']||'').substring(0,50)});
  });

  // Itens estratégicos sem movimento
  var stalEstr = spActive.filter(function(w){ return getLevel(w.fields['System.Tags']||'')==='Estratégico' && isStale(w,7); });
  if (stalEstr.length) ins.push({cls:'i-yellow',ico:'🎯',text:stalEstr.length+' item(ns) Estratégico(s) sem movimentação na '+sprintName+'.'});

  // ── LARANJA: ação necessária ─────────────────────────────
  // Sobrecarga individual
  var collabRW = {};
  sprintWis.forEach(function(w){
    var a=w.fields['System.AssignedTo']; if(!a||!a.displayName) return;
    collabRW[a.displayName]=(collabRW[a.displayName]||0)+(w.fields['Microsoft.VSTS.Scheduling.RemainingWork']||0);
  });
  Object.keys(collabRW).forEach(function(name){
    var capHrsPessoa = curIter ? getSprintCapacity(name, curIter.startDate, curIter.finishDate) : totalDays * DEFAULT_WEEKLY_HOURS / 5;
    if (capHrsPessoa > 0 && collabRW[name] > capHrsPessoa) {
      ins.push({cls:'i-orange',ico:'🔴',text:name+' está com '+collabRW[name].toFixed(0)+'h de RW em uma sprint de '+capHrsPessoa.toFixed(0)+'h disponíveis — excesso de carga.'});
    }
  });

  // Itens atrasados sem atualização
  spDelayed.forEach(function(w){
    if (isStale(w,3)) {
      ins.push({cls:'i-orange',ico:'🚨',text:'Item #'+w.fields['System.Id']+' está atrasado há mais de 3 dias sem atualização de estado.'});
    }
  });

  // Próxima sprint vazia
  var today2 = new Date();
  var futureIters = (S.iterations||[]).filter(function(it){
    return it.startDate && localDate(it.startDate) > today2;
  }).sort(function(a,b){ return localDate(a.startDate) - localDate(b.startDate); });
  if (futureIters.length > 0) {
    var nextSp = futureIters[0];
    var nextSpItems = allWis.filter(function(w){
      var ip=w.fields['System.IterationPath']||'';
      return ip.endsWith(nextSp.name)||ip===nextSp.path;
    });
    if (!nextSpItems.length) {
      ins.push({cls:'i-orange',ico:'📅',text:'Próxima sprint ('+nextSp.name+') ainda não tem nenhum item planejado.'});
    }
  }

  // Ordenar por criticidade: laranja → amarelo → verde
  var order = {'i-orange':0,'i-yellow':1,'i-green':2,'i-blue':3};
  ins.sort(function(a,b){ return (order[a.cls]||9)-(order[b.cls]||9); });
  return ins;
}

function pageDashboard() {
  var div = el('div');
  var wis = S.workItems;
  var today = new Date(); today.setHours(0,0,0,0);

  // ── Sprint atual ────────────────────────────────────────
  var curIter = null;
  (S.iterations||[]).forEach(function(it){
    if (!it.startDate) return;
    var sd = localDate(it.startDate), fd = localDate(it.finishDate);
    fd.setHours(23,59,59,0);
    if (sd <= today && fd >= today) curIter = it;
  });

  // ── Filtros ─────────────────────────────────────────────
  var fb = el('div','filter-bar');
  ap(fb, el('span','flbl','Área:'),
    mkSelect(['Todas','Controladoria','Educação Profissional'], S.dashArea, function(v){S.dashArea=v;render();}),
    el('span','flbl','Nível:'),
    mkSelect(['Todos','Estratégico','Tático','Operacional','Plano de Trabalho','Apoio à Gestão','T.I.'], S.dashLevel, function(v){S.dashLevel=v;render();}),
    mkBtn('↻ Atualizar','btn-orange btn-sm', function(){ loadData(S.token,true); })
  );
  if (S.cacheTs) { var ci=el('div','cache-info'); ci.textContent='Atualizado '+timeAgo(S.cacheTs); ap(fb,ci); }
  ap(div, el('div','page-title','Dashboard'), el('div','page-sub','Gestão de execução · '+S.year), fb);

  if (!S.token) { ap(div, mkEmptyState('🔑','Token não configurado','Configure o PAT em Configurações.', mkBtn('Ir para Configurações','btn-primary btn-sm',function(){S.page='settings';render();}))); return div; }
  if (!wis.length) { ap(div, mkEmptyState('📭','Sem dados','Clique em ↻ Atualizar para carregar dados do Azure DevOps.')); return div; }

  // ── Filtrar work items ──────────────────────────────────
  var filtWis = wis.filter(function(w){
    if (S.dashArea !== 'Todas' && getArea(w.fields['System.AreaPath']) !== S.dashArea) return false;
    if (S.dashLevel !== 'Todos' && getLevel(w.fields['System.Tags']||'') !== S.dashLevel) return false;
    return true;
  });

  // ── Itens da sprint atual ───────────────────────────────
  var sprintWis = curIter ? filtWis.filter(function(w){
    var ip = w.fields['System.IterationPath']||'';
    return ip.endsWith(curIter.name) || ip === curIter.path;
  }) : [];

  var spDone    = sprintWis.filter(function(w){ return isDone(w.fields['System.State']||''); });
  var spActive  = sprintWis.filter(function(w){ var s=w.fields['System.State']||''; return !isDone(s)&&!isPaused(s)&&!isCancel(s); });
  var spAlmost  = spActive.filter(function(w){ return (w.fields['Microsoft.VSTS.Scheduling.RemainingWork']||999) <= 4; });
  var spDelayed = sprintWis.filter(function(w){ return isDelayed(w); });
  var spStale   = spActive.filter(function(w){ return isStale(w,7); });
  var spAttn    = sprintWis.filter(function(w){ return isDelayed(w)||isStale(w,7); });

  // ── BLOCO 1: Situação da sprint atual ────────────────────
  var spCard = el('div','card'); spCard.style.marginBottom='18px';
  var spHd = el('div','card-hd');

  function wdLeft(finishDate) {
    if (!finishDate) return 0;
    var fd = localDate(finishDate); fd.setHours(23,59,59,0);
    var cur = new Date(today); var n = 0;
    while (cur <= fd) { var d=cur.getDay(); if(d!==0&&d!==6) n++; cur.setDate(cur.getDate()+1); }
    return n;
  }
  function fmtDate(d) { var dd=new Date(d); return dd.getDate().toString().padStart(2,'0')+'/'+(dd.getMonth()+1).toString().padStart(2,'0'); }

  if (curIter) {
    var spTitle = el('div'); spTitle.style.cssText='display:flex;align-items:center;gap:12px;flex-wrap:wrap';
    var spName = el('span',''); spName.style.cssText='font-size:16px;font-weight:800;color:var(--senai-blue)';
    spName.textContent = 'SPRINT ATUAL — '+curIter.name;
    var spDates = el('span','badge b-light'); spDates.textContent = fmtDate(curIter.startDate)+' a '+fmtDate(curIter.finishDate);
    var spDays = el('span','badge b-blue'); spDays.textContent = wdLeft(curIter.finishDate)+' dias úteis restantes';
    ap(spTitle, spName, spDates, spDays);
    ap(spHd, spTitle);
  } else {
    ap(spHd, el('span','card-title','Sprint atual não identificada'));
  }
  var spBody = el('div','card-body');
  var spKpi = el('div','kpi-grid'); spKpi.style.gridTemplateColumns='repeat(4,1fr)';
  ap(spKpi,
    mkKpi('Em andamento', spActive.length, curIter?'na '+curIter.name:'', 'kpi-blue'),
    mkKpi('Quase prontos', spAlmost.length, 'RW ≤ 4h', 'kpi-green'),
    mkKpi('Concluídos', spDone.length, curIter?pct(spDone.length,sprintWis.length)+'% do total':'', spDone.length>0?'kpi-green':'kpi-light'),
    mkKpi('Atenção', spAttn.length, 'atrasados + parados', spAttn.length>0?'kpi-red':'kpi-green')
  );
  ap(spBody, spKpi); ap(spCard, spHd, spBody);

  // ── BLOCO 2: Grid de colaboradores na sprint ─────────────
  var collabSpCard = el('div','card'); collabSpCard.style.marginBottom='18px';
  var collabSpHd = el('div','card-hd'); ap(collabSpHd, el('span','card-title','👥 Equipe na Sprint'));
  var collabGrid = el('div','collab-grid');

  var collabMap2 = {};
  sprintWis.forEach(function(w){
    var a=w.fields['System.AssignedTo']; if(!a||!a.displayName) return;
    var name=a.displayName;
    if(!collabMap2[name]) collabMap2[name]={name:name,items:[],done:0,delayed:0,url:a._links&&a._links.avatar&&a._links.avatar.href};

function pageSprint() {
  var div = el('div');
  var wis = S.workItems;

  // ── Identificar sprints disponíveis ──────────────────────
  var sprintMap = {};
  var today = new Date(); today.setHours(0,0,0,0);

  (S.iterations||[]).forEach(function(it){
    if (!it.startDate) return;
    var sd = localDate(it.startDate);
    var fd = localDate(it.finishDate);
    fd.setHours(23,59,59,0);
    var name = it.name;
    sprintMap[name] = {name:name, path:it.path, sd:sd, fd:fd,
      isCurrent: sd<=today && fd>=today,
      isPast: fd<today,
      isFuture: sd>today
    };
  });

  var sprintNames = Object.keys(sprintMap).sort(function(a,b){
    return sprintMap[a].sd - sprintMap[b].sd;
  });

  var currentSprint = sprintNames.filter(function(n){ return sprintMap[n].isCurrent; })[0] || null;
  var futureSprints = sprintNames.filter(function(n){ return sprintMap[n].isFuture; });
  var pastSprints   = sprintNames.filter(function(n){ return sprintMap[n].isPast; });
  var nextSprint    = futureSprints[0] || null;
  var prevSprint    = pastSprints[pastSprints.length-1] || null;

  if (!S.selSprint) S.selSprint = currentSprint || sprintNames[sprintNames.length-1];

  function workDaysLeft(sprint) {
    if (!sprint) return 0;
    var sp = sprintMap[sprint]; if (!sp) return 0;
    var end = new Date(sp.fd); end.setHours(23,59,59,0);
    var cur = new Date(today);
    var days = 0;
    while (cur <= end) {
      var d = cur.getDay();
      if (d!==0 && d!==6) days++;
      cur.setDate(cur.getDate()+1);
    }
    return days;
  }

  function workDaysBetween(sd, fd) {
    var cur = new Date(sd); cur.setHours(0,0,0,0);
    var end = new Date(fd); end.setHours(23,59,59,0);
    var days = 0;
    while (cur <= end) { var d=cur.getDay(); if(d!==0&&d!==6) days++; cur.setDate(cur.getDate()+1); }
    return days;
  }

  function daysUntil(d) {
    return Math.ceil((d - today)/(1000*60*60*24));
  }
  function daysSince(d) {
    return Math.ceil((today - d)/(1000*60*60*24));
  }
  function fmtDate(d) {
    return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0');
  }

  // ── Filtros ──────────────────────────────────────────────
  var fb = el('div','filter-bar');

  var selSprint = document.createElement('select');
  sprintNames.forEach(function(sn){
    var o = document.createElement('option');
    o.value = sn; o.textContent = sn;
    if (sn===S.selSprint) o.selected=true;
    selSprint.appendChild(o);
  });
  selSprint.onchange = function(){ S.selSprint = this.value; render(); };

  if (!S.selArea2) S.selArea2='Todas';
  var selArea = document.createElement('select');
  ['Todas','Controladoria','Educação Profissional'].forEach(function(a){
    var o=document.createElement('option'); o.value=a; o.textContent=a;
    if(a===S.selArea2) o.selected=true; selArea.appendChild(o);
  });
  selArea.onchange=function(){ S.selArea2=this.value; render(); };

  if (!S.selCollab2) S.selCollab2='Todos';
  var collabs = [];
  wis.forEach(function(w){
    var a=w.fields['System.AssignedTo']; if(a&&a.displayName&&collabs.indexOf(a.displayName)===-1) collabs.push(a.displayName);
  });
  collabs.sort();
  var selCollab = document.createElement('select');
  ['Todos'].concat(collabs).forEach(function(c){
    var o=document.createElement('option'); o.value=c; o.textContent=c;
    if(c===S.selCollab2) o.selected=true; selCollab.appendChild(o);
  });
  selCollab.onchange=function(){ S.selCollab2=this.value; render(); };

  ap(fb, el('span','flbl','Sprint:'), selSprint, el('span','flbl','Área:'), selArea, el('span','flbl','Colaborador:'), selCollab);

  // ── Cards de contexto temporal ───────────────────────────
  function mkSprintCard(label, spName, color) {
    var card = el('div','kpi kpi-'+color);
    var sp = spName ? sprintMap[spName] : null;
    ap(card, el('div','kpi-label', label));
    if (!sp) { ap(card, el('div','kpi-value','—')); return card; }
    ap(card, el('div','kpi-value', spName));
    var dateStr = fmtDate(sp.sd)+' a '+fmtDate(sp.fd);
    var extra = '';
    if (sp.isCurrent) extra = workDaysLeft(spName)+' dias úteis restantes';
    else if (sp.isFuture) extra = 'Começa em '+daysUntil(sp.sd)+' dia(s)';
    else extra = 'Encerrada há '+daysSince(sp.fd)+' dia(s)';
    ap(card, el('div','kpi-sub', dateStr), el('div','kpi-sub', extra));
    return card;
  }

  var ctxGrid = el('div','kpi-grid'); ctxGrid.style.gridTemplateColumns='repeat(3,1fr)';
  ap(ctxGrid,
    mkSprintCard('SPRINT ANTERIOR', prevSprint, 'blue'),
    mkSprintCard('SPRINT ATUAL', currentSprint, 'orange'),
    mkSprintCard('PRÓXIMA SPRINT', nextSprint, 'light')
  );

  ap(div, el('div','page-title','Sprint'), el('div','page-sub','Visão por sprint · 2026'), fb, ctxGrid);

  if (!S.token) { ap(div, mkEmptyState('🔑','Token não configurado','Vá em Configurações e insira seu PAT do Azure DevOps.')); return div; }
  if (!wis.length) { ap(div, mkEmptyState('📭','Sem dados','Aguardando sincronização...')); return div; }
  if (!sprintNames.length) { ap(div, mkEmptyState('📅','Sem sprints','Nenhuma sprint encontrada para 2026. Verifique o Azure DevOps.')); return div; }

  // ── Filtrar itens da sprint selecionada ──────────────────
  var selSp = sprintMap[S.selSprint];
  var spWis = wis.filter(function(w){
    var ip = w.fields['System.IterationPath']||'';
    if (!S.selSprint || !ip.includes(S.selSprint)) return false;
    if (S.selArea2!=='Todas' && getArea(w.fields['System.AreaPath'])!==S.selArea2) return false;
    if (S.selCollab2!=='Todos') {
      var a=w.fields['System.AssignedTo']; if(!a||a.displayName!==S.selCollab2) return false;
    }
    return true;
  });

  // ── KPIs da sprint ────────────────────────────────────────
  var total = spWis.length;
  var done = spWis.filter(function(w){ return isDone(w.fields['System.State']||''); }).length;
  var inprog = spWis.filter(function(w){ var s=w.fields['System.State']||''; return !isDone(s)&&!isPaused(s)&&!isCancel(s)&&s!==''; }).length;
  var delayed = spWis.filter(function(w){ return isDelayed(w); }).length;
  var noResp = spWis.filter(function(w){ return !w.fields['System.AssignedTo']||!w.fields['System.AssignedTo'].displayName; }).length;

  var kpiGrid = el('div','kpi-grid');
  ap(kpiGrid,
    mkKpi('Total de itens', total, 'na sprint', 'kpi-blue'),
    mkKpi('Concluídos', done, (total?Math.round(done/total*100):0)+'% do total', 'kpi-green'),
    mkKpi('Em andamento', inprog, 'ativos', 'kpi-light'),
    mkKpi('Atrasados', delayed, delayed>0?'atenção':'ok', delayed>0?'kpi-red':'kpi-green'),
    mkKpi('Sem responsável', noResp, noResp>0?'pendente':'ok', noResp>0?'kpi-orange':'kpi-green')
  );

  // ── Barras de progresso ───────────────────────────────────
  var pct_exec = total ? Math.round(done/total*100) : 0;

  // ── Painel Comparativo Tri-Sprint ──────────────────────────

    var spNext = nextSprint ? sprintMap[nextSprint] : null;

    function sprintStats(spName) {
      if (!spName) return null;
      var items = wis.filter(function(w){
        var ip=w.fields['System.IterationPath']||'';
        return ip.includes(spName);

      });
      return {name:spName, items:items, total:items.length, done:done3, active:active3,
              delayed:delayed3, rw:rw3, exec:execPct, cap:totalCap};

      {label:'⬅ ANTERIOR', spName:prevSprint, color:'#64748b'},

      el('span','card-title','🔄 Visão Comparativa — Review & Planejamento'),

    ap(triCard, triHd, triBody);

    stats.forEach(function(s, si){

      var hdr = el('div'); hdr.style.cssText='font-size:11px;font-weight:800;text-transform:uppercase;color:'+s.color+';margin-bottom:8px';
      hdr.textContent = s.label+(s.spName?' · '+s.spName:'');
      ap(col, hdr);

      if (!st) {
        var empty = el('div'); empty.style.cssText='color:var(--senai-muted);font-size:13px;text-align:center;padding:20px 0';
        empty.textContent = s.spName ? 'Sem itens planejados' : 'Não identificada';
        ap(col, empty);
        ap(triGrid, col); return;
      }

      // Mini KPIs
      var miniGrid = el('div'); miniGrid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px';
      function miniKpi(lbl, val, clr){
        var k=el('div'); k.style.cssText='background:#f8fafc;border-radius:6px;padding:6px 8px;';
        var kv=el('div'); kv.style.cssText='font-size:18px;font-weight:800;color:'+(clr||'var(--senai-blue)');

        var kl=el('div'); kl.style.cssText='font-size:10px;color:var(--senai-muted);margin-top:2px';
        kl.textContent=lbl;
        ap(k,kv,kl); return k;
      }
      ap(miniGrid,
        miniKpi('Total', st.total),
        miniKpi('Concluídos', st.done, '#22c55e'),
        miniKpi('Atrasados', st.delayed, st.delayed>0?'#ef4444':'#22c55e'),
        miniKpi('RW acumulado', st.rw.toFixed(0)+'h', 'var(--senai-orange)')

      ap(col, miniGrid);

      // Barra de execução
      var barWrap = el('div'); barWrap.style.cssText='margin-bottom:8px';
      var barLbl = el('div'); barLbl.style.cssText='display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px';
      ap(barLbl, el('span','','Execução'), el('span','',st.exec+'%'));

      var barFg = el('div'); barFg.style.cssText='height:100%;border-radius:3px;width:'+Math.min(st.exec,100)+'%;background:'+(st.exec>=70?'#22c55e':st.exec>=40?'#eab308':'#ef4444');
      ap(barBg,barFg); ap(barWrap,barLbl,barBg); ap(col,barWrap);

      // Link "Ver itens"
      if (s.spName) {
        var viewBtn = el('button','btn btn-ghost btn-sm'); viewBtn.style.cssText='font-size:11px;padding:3px 8px;margin-top:4px;width:100%';
        viewBtn.textContent='🔍 Detalhar sprint';
        (function(spNm){ viewBtn.onclick = function(){ S.selSprint=spNm; render(); }; })(s.spName);
        ap(col, viewBtn);
      }

      ap(triGrid, col);
    });

    ap(triBody, triGrid);
    ap(div, triCard);
  })();

  ap(div, progCard, lvlGrid, collCard, tblCard);
  return div;
}

  function generateAndShowEmail(ud, uname) {
    var areaId = 'email-area-'+uname.replace(/[^a-z0-9]/gi,'_');
    var areaEl = document.getElementById(areaId);
    if (!areaEl) return;
    if (areaEl.style.display !== 'none') { areaEl.style.display='none'; return; }

    var firstName = uname==='__sem_responsavel__' ? 'Responsável' : uname.split(' ')[0];
    var lines = [];
    lines.push('Olá, ' + firstName + '! Tudo bem? 😊');
    lines.push('');
    lines.push('Passando aqui para te avisar sobre algumas pendências que apareceram no nosso painel de monitoramento do Azure DevOps. São ajustes simples, mas que fazem bastante diferença para a gente conseguir acompanhar o andamento das atividades da Educação Profissional direitinho!');
    lines.push('');
    lines.push('Encontrei ' + ud.items.length + ' item(ns) com informações que precisam de uma atualização rápida:');
    lines.push('');

    if (ud.counts.noarea) {
      lines.push('📍 SEM ÁREA CLASSIFICADA (' + ud.counts.noarea + ' item(ns))');
      lines.push('   O campo "Area Path" está em branco ou fora das áreas válidas (Controladoria / Educação Profissional).');
      lines.push('   Por que importa: sem área definida, o item fica invisível nos nossos painéis e não entra nos indicadores da equipe.');
      lines.push('   O que fazer: é só abrir o item no Azure e escolher a área certa (Controladoria ou Educação Profissional).');
      lines.push('');
    }
    if (ud.counts.notag) {
      lines.push('🏷️ SEM TAG DE CLASSIFICAÇÃO (' + ud.counts.notag + ' item(ns))');
      lines.push('   O campo "Tags" está vazio — não é possível identificar se o item é Estratégico, Tático ou Operacional.');
      lines.push('   Por que importa: sem a tag, a gente não consegue saber se a atividade é Estratégica, Tática ou Operacional.');
      lines.push('   O que fazer: adicione uma das tags no campo correspondente: Estratégico, Tático, Operacional, Plano de trabalho, Apoio a gestão ou T.I.');
      lines.push('');
    }
    if (ud.counts.nosprint) {
      lines.push('📅 SEM SPRINT DEFINIDA (' + ud.counts.nosprint + ' item(ns))');
      lines.push('   O campo "Iteration Path" não está associado a nenhuma sprint (ex: "SENAI\Sprint XX").');
      lines.push('   Por que importa: sem sprint, o item some do planejamento e a gente não consegue acompanhar por período.');
      lines.push('   O que fazer: abra o item e selecione a sprint correspondente no campo "Iteration Path".');
      lines.push('');
    }
    if (ud.counts.noparent) {
      lines.push('🔗 SEM ITEM PAI VINCULADO (' + ud.counts.noparent + ' item(ns))');
      lines.push('   O item não está associado a nenhum Plano de Ação ou estrutura hierárquica superior.');
      lines.push('   Por que importa: sem o vínculo com o item pai, o progresso do Plano de Ação não é calculado corretamente.');
      lines.push('   O que fazer: vincule o item ao Plano de Ação correspondente usando o campo "Parent" no Azure.');
      lines.push('');
    }
    if (ud.counts.overdue) {
      lines.push('⏰ ITENS VENCIDOS SEM CONCLUSÃO (' + ud.counts.overdue + ' item(ns))');
      lines.push('   Há itens com a sprint encerrada que ainda estão com status em andamento.');
      lines.push('   Por que importa: itens em aberto após o fim da sprint afetam nossos indicadores de conformidade.');
      lines.push('   O que fazer: atualize o status para Concluído, Cancelado ou Pausado — ou mova para a sprint atual, se ainda estiver em andamento.');
      lines.push('');
    }

    lines.push('Para facilitar, seguem os IDs dos itens com pendência:');
    lines.push(ud.items.map(function(w){ return '#'+w.fields['System.Id']; }).join(', '));
    lines.push('');
    lines.push('Se tiver qualquer dúvida sobre como fazer esses ajustes no Azure, é só me chamar — fico feliz em ajudar! 🙂');
    lines.push('');
    lines.push('Obrigada pela atenção e pelo cuidado com as informações. A gente só consegue monitorar bem quando os dados estão certinhos!');
    lines.push('');
    lines.push('Abraço,');
    lines.push('Clarisse');
    lines.push('Educação Profissional · SENAI DR Alagoas');

    var emailText = lines.join('\n');

    areaEl.innerHTML = '';
    areaEl.style.cssText='margin-top:12px;padding:12px;background:#f8fafc;border:1px solid var(--senai-border);border-radius:8px';

    var ta = document.createElement('textarea');
    ta.value = emailText;
    ta.style.cssText='width:100%;height:260px;font-size:12px;font-family:monospace;border:1px solid var(--senai-border);border-radius:6px;padding:10px;resize:vertical;background:#fff;color:var(--senai-text)';
    ta.readOnly = true;

    var copyBtn = mkBtn('📋 Copiar Email','btn-primary btn-sm', function(t_){ return function(){
      t_.select(); document.execCommand('copy');
      copyBtn.textContent='✓ Copiado!';
      setTimeout(function(){ copyBtn.textContent='📋 Copiar Email'; }, 2000);
    };}(ta));

    var closeBtn = mkBtn('Fechar','btn-ghost btn-sm', function(el_){ return function(){ el_.style.display='none'; }; }(areaEl));

    var btnRow = el('div'); btnRow.style.cssText='display:flex;gap:8px;margin-bottom:8px';
    ap(btnRow, copyBtn, closeBtn);
    ap(areaEl, btnRow, ta);
    areaEl.style.display='block';
  }
  // ── FIM SEÇÃO USUÁRIOS ───────────────────────────────────────────────────

  return div;
}

function showToast(msg) {
  var t = document.getElementById('toast-msg');
  if (!t) {
    t = document.createElement('div'); t.id='toast-msg';
    t.style.cssText='position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.25);opacity:0;transition:opacity 0.3s';
    document.body.appendChild(t);
  }
  t.textContent = msg; t.style.opacity='1';
  clearTimeout(t._to); t._to = setTimeout(function(){ t.style.opacity='0'; }, 3000);
}

function renderColabSidebar() {
  var s = el('div','sidebar');
  var logo = el('div','sidebar-logo');
  // Reutilizar o mesmo bloco de logo do sidebar principal
  var logoImg2 = document.createElement('img');
  var existingLogo = document.querySelector('#sidebar .sidebar-logo img');
  if (existingLogo) {
    logoImg2.src = existingLogo.src;
  } else {
    // Fallback: texto simples
    logo.textContent = 'SENAi';
    logo.style.cssText = 'color:#fff;font-size:22px;font-weight:900;font-style:italic;padding:16px 20px;letter-spacing:-1px';
  }
  if (existingLogo) {
    logoImg2.alt = 'SENAi';
    logoImg2.style.cssText = 'width:180px;height:auto;display:block;margin:0 auto';
    ap(logo, logoImg2);
  }
  ap(s, logo);
  var nav = el('div','nav');
  ap(nav, el('div','nav-label','Olá, '+S.colabName));
  var items = [
    {id:'collab_meus_itens',   ico:'📋', lbl:'Meus Itens'},

    {id:'collab_desempenho',   ico:'📈', lbl:'Meu Desempenho'},
  ];
  items.forEach(function(n){
    var ni = el('div','nav-item'+(S.page===n.id?' active':''));

    ap(nav,ni);
  });
  ap(s, nav, el('div','sidebar-footer','SENAi DR Alagoas · Colaborador'));
  return s;
}

function getColabItems() {
  return S.workItems.filter(function(w){
    var a = w.fields['System.AssignedTo'];
    return a && a.displayName === S.colabName;
  });
}
function getColabCurIter() {
  var today = new Date(); today.setHours(0,0,0,0);
  var found = null;
  (S.iterations||[]).forEach(function(it){
    if (!it.startDate) return;
    var sd=localDate(it.startDate), fd=localDate(it.finishDate); fd.setHours(23,59,59,0);
    if (sd<=today && fd>=today) found=it;
  });
  return found;
}

// ============================================================
// MODO COLABORADOR — Aba: Meus Itens
// ============================================================
function pageColabMeusItens() {
  var div = el('div');
  var wis = getColabItems();
  var today = new Date(); today.setHours(0,0,0,0);

  ap(div, el('div','page-title','📋 Meus Itens'), el('div','page-sub',S.colabName+' · 2026'));

  if (!S.token) { ap(div, mkEmptyState('🔑','Acesso inválido','Seu link de acesso expirou. Solicite um novo link ao gestor responsável.')); return div; }
  if (!wis.length) { ap(div, mkEmptyState('📭','Sem itens','Nenhum item atribuído a você foi encontrado.')); return div; }

  // Cards de alerta pessoal
  var delayed = wis.filter(function(w){ return isDelayed(w); });
  var noSprint = wis.filter(function(w){ var ip=w.fields['System.IterationPath']||''; return !ip || ip===('Senai') || ip.split('\\').length < 3; });

  var alertsBar = el('div','kpi-grid'); alertsBar.style.cssText='grid-template-columns:repeat(3,1fr);margin-bottom:16px';
  ap(alertsBar,
    mkKpi('⚠ Atrasados', delayed.length, null, delayed.length>0?'kpi-red':'kpi-green'),
    mkKpi('👻 Sem sprint', noSprint.length, null, noSprint.length>0?'kpi-orange':'kpi-green'),
    mkKpi('Total de itens', wis.length, null, 'kpi-blue')
  );
  ap(div, alertsBar);

  // Filtros
  var allSprints = (S.iterations||[]).filter(function(it){ return it.startDate&&it.startDate.startsWith('2026'); })
    .sort(function(a,b){return localDate(a.startDate)-localDate(b.startDate);})
    .map(function(it){return it.name;});

  if (!S.colabFiltSprint) S.colabFiltSprint = '__all__';
  if (!S.colabFiltState)  S.colabFiltState  = '__all__';
  if (!S.colabFiltLevel)  S.colabFiltLevel  = '__all__';

  var spOpts = [{v:'__all__',l:'Todas as sprints'}].concat(allSprints.map(function(s){return {v:s,l:s};}));
  var stOpts = [{v:'__all__',l:'Todos os estados'},
    {v:'ativo',l:'Em andamento'},{v:'done',l:'Concluído'},
    {v:'paused',l:'Pausado'},{v:'delayed',l:'Atrasado'}];
  var lvOpts = [{v:'__all__',l:'Todos os níveis'},
    'Estratégico','Tático','Operacional','Plano de trabalho','Apoio a gestão','T.I.'].map(function(o){
      return typeof o==='string' ? {v:o,l:o} : o;
    });

  var fb = el('div','filter-bar');
  ap(fb,
    el('span','flbl','Sprint:'), mkSelect(spOpts, S.colabFiltSprint, function(v){S.colabFiltSprint=v;render();}),
    el('span','flbl','Estado:'), mkSelect(stOpts, S.colabFiltState, function(v){S.colabFiltState=v;render();}),
    el('span','flbl','Nível:'),  mkSelect(lvOpts, S.colabFiltLevel, function(v){S.colabFiltLevel=v;render();})
  );
  ap(div, fb);

  // Filtrar itens
  var filtered = wis.filter(function(w){
    if (S.colabFiltSprint!=='__all__') {
      var ip=w.fields['System.IterationPath']||'';
      if (!ip.includes(S.colabFiltSprint)) return false;
    }
    if (S.colabFiltState!=='__all__') {
      var st=w.fields['System.State']||'';
      if (S.colabFiltState==='done' && !isDone(st)) return false;
      if (S.colabFiltState==='paused' && !isPaused(st)) return false;
      if (S.colabFiltState==='delayed' && !isDelayed(w)) return false;
      if (S.colabFiltState==='ativo' && (isDone(st)||isPaused(st)||isCancel(st))) return false;
    }
    if (S.colabFiltLevel!=='__all__') {
      if (getLevel(w.fields['System.Tags']||'')!==S.colabFiltLevel) return false;
    }
    return true;
  });

  // Tabela
  var tblCard = el('div','card');
  var tblHd = el('div','card-hd'); ap(tblHd, el('span','card-title',filtered.length+' item(ns) encontrado(s)'));
  var tblWrap = el('div','tbl-wrap');
  var tbl = document.createElement('table');
  var thead = el('thead'); var hrow = el('tr');
  ['ID','Título','Nível','Sprint','Estado','RW'].forEach(function(h){
    var th2=document.createElement('th'); th2.textContent=h; ap(hrow,th2);
  });
  ap(thead,hrow); ap(tbl,thead);
  var tbody = el('tbody');
  filtered.forEach(function(w){
    var tr=document.createElement('tr');
    if(isDelayed(w)) tr.style.background='#fff5f5';
    var idTd=document.createElement('td');
    var idA=document.createElement('a');
    idA.href='https://dev.azure.com/SENAIAlagoas/Senai/_workitems/edit/'+w.fields['System.Id'];
    idA.target='_blank'; idA.textContent='#'+w.fields['System.Id'];
    idA.style.cssText='color:var(--senai-blue);font-weight:700';
    ap(idTd,idA);
    var titleTd=document.createElement('td'); titleTd.textContent=w.fields['System.Title']||''; titleTd.style.maxWidth='260px';
    var lvTd=document.createElement('td'); ap(lvTd,mkLevelBadge(w.fields['System.Tags']||''));
    var sprintName=(w.fields['System.IterationPath']||'').split('\\').pop();
    var spTd=document.createElement('td'); spTd.textContent=sprintName||'—';
    var stTd=document.createElement('td'); ap(stTd,mkBadge(w.fields['System.State']||'',isDelayed(w)));
    var rwTd=document.createElement('td'); rwTd.textContent=(w.fields['Microsoft.VSTS.Scheduling.RemainingWork']||0)+'h';
    ap(tr,idTd,titleTd,lvTd,spTd,stTd,rwTd);
    ap(tbody,tr);
  });
  ap(tbl,tbody); ap(tblWrap,tbl); ap(tblCard,tblHd,tblWrap);
  ap(div, tblCard);

  // Apontamentos de parametrização
  var govProbs = wis.filter(function(w){ return govIssues(w).length>0; });
  if (govProbs.length) {

// MODO COLABORADOR — Aba: Minha Sprint
// ============================================================
function pageColabMinhaSprint() {
  var div = el('div');
  var wis = getColabItems();
  var curIter = getColabCurIter();

  ap(div, el('div','page-title','🏃 Minha Sprint'), el('div','page-sub',S.colabName));

  if (!S.token) { ap(div, mkEmptyState('🔑','Acesso inválido','Seu link de acesso expirou. Solicite um novo link ao gestor responsável.')); return div; }

  if (!curIter) { ap(div, mkEmptyState('📅','Sem sprint atual','Nenhuma sprint em andamento no momento.')); return div; }

  // Card de contexto
  var ctxCard = el('div','card'); ctxCard.style.marginBottom='16px';
  var ctxBody = el('div','card-body');
  var today = new Date(); today.setHours(0,0,0,0);
  var sd = localDate(curIter.startDate); var fd = localDate(curIter.finishDate); fd.setHours(23,59,59,0);
  function fmtD(d){return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0');}
  function wdLeft(){var cur2=new Date(today),n=0;while(cur2<=fd){var d2=cur2.getDay();if(d2!==0&&d2!==6)n++;cur2.setDate(cur2.getDate()+1);}return n;}
  var ctxTxt = el('div'); ctxTxt.style.cssText='font-size:16px;font-weight:800;color:var(--senai-blue)';
  ctxTxt.textContent=curIter.name+' · '+fmtD(sd)+' a '+fmtD(fd)+' · '+wdLeft()+' dias úteis restantes';
  ap(ctxBody, ctxTxt); ap(ctxCard, ctxBody);
  ap(div, ctxCard);

  // Itens da sprint atual
  var spWis = wis.filter(function(w){
    var ip=w.fields['System.IterationPath']||'';
    return ip.includes(curIter.name);
  });

  // KPIs pessoais
  var done2=spWis.filter(function(w){return isDone(w.fields['System.State']||'');});
  var active2=spWis.filter(function(w){var st=w.fields['System.State']||'';return !isDone(st)&&!isPaused(st)&&!isCancel(st);});
  var delayed2=spWis.filter(function(w){return isDelayed(w);});
  var rw2=spWis.reduce(function(s,w){return s+(w.fields['Microsoft.VSTS.Scheduling.RemainingWork']||0);},0);

  var kg = el('div','kpi-grid'); kg.style.gridTemplateColumns='repeat(5,1fr)';
  ap(kg,
    mkKpi('Meus itens', spWis.length, null, 'kpi-blue'),
    mkKpi('Concluídos', done2.length, null, 'kpi-green'),
    mkKpi('Em andamento', active2.length, null, 'kpi-light'),
    mkKpi('Atrasados', delayed2.length, null, delayed2.length>0?'kpi-red':'kpi-green'),
    mkKpi('Remaining Work', rw2.toFixed(0)+'h', null, 'kpi-orange')
  );
  ap(div, kg);

  // Barra de esforço
  function wdCount2(s2,f2){if(!s2||!f2)return 0;var c2=localDate(s2),e=localDate(f2);e.setHours(23,59,59,0);var n=0;while(c2<=e){var d2=c2.getDay();if(d2!==0&&d2!==6)n++;c2.setDate(c2.getDate()+1);}return n;}
  var capHrs = getSprintCapacity(S.colabName, curIter.startDate, curIter.finishDate);
  var uso = capHrs>0?(rw2/capHrs*100):0;
  var semC = uso<40?'#164194':uso<=80?'#22c55e':uso<=100?'#eab308':'#ef4444';
  var semL = uso<40?'🔵 Subutilizado':uso<=80?'🟢 Dentro do esperado':uso<=100?'🟡 Atenção':'🔴 Excesso';
  var efCard = el('div','card'); efCard.style.marginTop='16px';
  var efHd = el('div','card-hd'); ap(efHd, el('span','card-title','⚡ Esforço na Sprint'));
  var efBody = el('div','card-body');
  var efGrid = el('div'); efGrid.style.cssText='display:grid;grid-template-columns:200px 1fr;gap:5px 12px;align-items:center';
  function efRow(lbl,val){var l=el('div');l.style.cssText='font-size:13px;color:var(--senai-muted)';l.textContent=lbl;var v=el('div');v.style.cssText='font-size:14px;font-weight:700';v.textContent=val;ap(efGrid,l,v);}
  efRow('Capacidade da sprint:', capHrs.toFixed(0)+'h');
  efRow('Remaining Work:', rw2.toFixed(0)+'h');
  efRow('Uso da capacidade:', uso.toFixed(0)+'%');
  efRow('Meta de ocupação:', '68,75% da capacidade');
  var semBadge = el('span','badge'); semBadge.textContent=semL; semBadge.style.cssText='background:'+semC+';color:#fff;padding:4px 12px;border-radius:999px;font-size:12px;margin-top:8px';
  ap(efBody, efGrid, semBadge); ap(efCard, efHd, efBody);
  ap(div, efCard);

  // Lista de itens agrupados por nível
  var spCard = el('div','card'); spCard.style.marginTop='16px';
  var spHd = el('div','card-hd'); ap(spHd, el('span','card-title','📌 Itens da Sprint — '+curIter.name));
  var spBody = el('div','card-body'); spBody.style.padding='0';
  var allLevels2 = ['Estratégico','Tático','Operacional','Plano de trabalho','Apoio a gestão','T.I.','Sem tag'];
  var renderedIds2 = {};
  allLevels2.forEach(function(lv){
    var lvItems = spWis.filter(function(w){ return getLevel(w.fields['System.Tags']||'')===lv; });
    if (!lvItems.length) return;
    var grpHd = el('div'); grpHd.style.cssText='padding:10px 16px;background:#f8fafc;font-weight:700;font-size:12px;border-bottom:1px solid var(--senai-border);color:var(--senai-blue)';
    grpHd.textContent=lv+' ('+lvItems.length+')'; ap(spBody, grpHd);
    lvItems.forEach(function(w){
      renderedIds2[w.id]=true;
      var row=el('div'); row.style.cssText='display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #f1f5f9;'+(isDelayed(w)?'background:#fff5f5':'');
      var idA=document.createElement('a'); idA.href='https://dev.azure.com/SENAIAlagoas/Senai/_workitems/edit/'+w.fields['System.Id']; idA.target='_blank'; idA.textContent='#'+w.fields['System.Id']; idA.style.cssText='color:var(--senai-blue);font-weight:700;min-width:52px;font-size:12px';
      var ttl=el('span'); ttl.textContent=w.fields['System.Title']||''; ttl.style.cssText='flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
      var rw3=el('span'); rw3.style.cssText='font-size:12px;color:var(--senai-muted);white-space:nowrap'; rw3.textContent=(w.fields['Microsoft.VSTS.Scheduling.RemainingWork']||0)+'h';
      ap(row,idA,mkLevelBadge(w.fields['System.Tags']||''),mkBadge(w.fields['System.State']||'',isDelayed(w)),ttl,rw3);
      ap(spBody,row);
    });
  });
  var unclassified2 = spWis.filter(function(w){ return !renderedIds2[w.id]; });
  if (unclassified2.length) {
    var grpHdU = el('div'); grpHdU.style.cssText='padding:10px 16px;background:#f8fafc;font-weight:700;font-size:12px;border-bottom:1px solid var(--senai-border);color:#94a3b8';
    grpHdU.textContent='Sem classificação ('+unclassified2.length+')'; ap(spBody, grpHdU);
    unclassified2.forEach(function(w){
      var row=el('div'); row.style.cssText='display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #f1f5f9;'+(isDelayed(w)?'background:#fff5f5':'');
      var idA=document.createElement('a'); idA.href='https://dev.azure.com/SENAIAlagoas/Senai/_workitems/edit/'+w.fields['System.Id']; idA.target='_blank'; idA.textContent='#'+w.fields['System.Id']; idA.style.cssText='color:var(--senai-blue);font-weight:700;min-width:52px;font-size:12px';
      var ttl=el('span'); ttl.textContent=w.fields['System.Title']||''; ttl.style.cssText='flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
      var rw3=el('span'); rw3.style.cssText='font-size:12px;color:var(--senai-muted);white-space:nowrap'; rw3.textContent=(w.fields['Microsoft.VSTS.Scheduling.RemainingWork']||0)+'h';
      ap(row,idA,mkBadge(w.fields['System.State']||'',isDelayed(w)),ttl,rw3);
      ap(spBody,row);
    });
  }
  if (!spWis.length) { ap(spBody, el('div','','Nenhum item atribuído a você nesta sprint.')); }
  ap(spCard, spHd, spBody); ap(div, spCard);
  return div;
}

// MODO COLABORADOR — Aba: Meu Desempenho
// ============================================================
function pageColabDesempenho() {
  var div = el('div');
  var wis = getColabItems();
  ap(div, el('div','page-title','📈 Meu Desempenho'), el('div','page-sub',S.colabName+' · 2026'));

  if (!S.token) { ap(div, mkEmptyState('🔑','Acesso inválido','Seu link de acesso expirou.')); return div; }

  var iters2026 = (S.iterations||[]).filter(function(it){ return it.startDate&&it.startDate.startsWith('2026'); })
    .sort(function(a,b){return localDate(a.startDate)-localDate(b.startDate);});

  // Cards de resumo
  var totalEntregues = wis.filter(function(w){ return isDone(w.fields['System.State']||''); }).length;
  var spComDados = 0, sumExec = 0, sumConf = 0;
  iters2026.forEach(function(it){
    var spItems = wis.filter(function(w){ var ip=w.fields['System.IterationPath']||''; return ip.includes(it.name); });
    if (!spItems.length) return;
    spComDados++;
    var dn = spItems.filter(function(w){ return isDone(w.fields['System.State']||''); }).length;
    sumExec += spItems.length ? (dn/spItems.length*100) : 0;
    var conf = spItems.filter(function(w){ return govIssues(w).length===0; }).length;
    sumConf += spItems.length ? (conf/spItems.length*100) : 0;
  });
  var mediaExec = spComDados ? Math.round(sumExec/spComDados) : 0;
  var mediaConf = spComDados ? Math.round(sumConf/spComDados) : 0;

  var sumCards = el('div','kpi-grid'); sumCards.style.gridTemplateColumns='repeat(4,1fr)';
  ap(sumCards,
    mkKpi('Média de execução', mediaExec+'%', null, 'kpi-blue'),
    mkKpi('Média de conformidade', mediaConf+'%', null, 'kpi-green'),
    mkKpi('Sprints com dados', spComDados, null, 'kpi-light'),
    mkKpi('Itens entregues', totalEntregues, null, 'kpi-orange')
  );
  ap(div, sumCards);

  // Tabela histórica
  var histCard = el('div','card'); histCard.style.marginTop='16px';
  var histHd = el('div','card-hd'); ap(histHd, el('span','card-title','📊 Desempenho por Sprint'));
  var histWrap = el('div','tbl-wrap');
  var histTbl = document.createElement('table');
  var histThead = el('thead'); var histHrow = el('tr');
  ['Sprint','Itens','Concluídos','Execução','Conformidade','RW','Capacidade','Uso','Situação'].forEach(function(h){
    var th2=document.createElement('th'); th2.textContent=h; ap(histHrow,th2);
  });
  ap(histThead,histHrow); ap(histTbl,histThead);
  var histTbody = el('tbody');

  function wdC3(s3,f3){if(!s3||!f3)return 0;var c3=localDate(s3),e=localDate(f3);e.setHours(23,59,59,0);var n=0;while(c3<=e){var d3=c3.getDay();if(d3!==0&&d3!==6)n++;c3.setDate(c3.getDate()+1);}return n;}

  iters2026.forEach(function(it){
    var spItems = wis.filter(function(w){ var ip=w.fields['System.IterationPath']||''; return ip.includes(it.name); });
    if (!spItems.length) return;
    var dn2 = spItems.filter(function(w){ return isDone(w.fields['System.State']||''); }).length;
    var rw4 = spItems.reduce(function(s,w){ return s+(w.fields['Microsoft.VSTS.Scheduling.RemainingWork']||0); },0);
    var cap5 = getSprintCapacity(S.colabName, it.startDate, it.finishDate);
    var exec5 = spItems.length ? Math.round(dn2/spItems.length*100) : 0;
    var conf5 = spItems.filter(function(w){ return govIssues(w).length===0; }).length;
    var confPct = spItems.length ? Math.round(conf5/spItems.length*100) : 0;
    var uso5 = cap5>0 ? Math.round(rw4/cap5*100) : 0;
    var semC5 = uso5<40?'#164194':uso5<=80?'#22c55e':uso5<=100?'#eab308':'#ef4444';
    var semL5 = uso5<40?'🔵':uso5<=80?'🟢':uso5<=100?'🟡':'🔴';
    var tr3=document.createElement('tr');
    [it.name, spItems.length, dn2, exec5+'%', confPct+'%', rw4.toFixed(0)+'h', cap5+'h', uso5+'%'].forEach(function(v){
      var td=document.createElement('td'); td.textContent=v; ap(tr3,td);
    });
    var semTd=document.createElement('td');
    var sb=el('span','badge'); sb.textContent=semL5; sb.style.background=semC5; sb.style.color='#fff'; sb.style.padding='2px 8px'; sb.style.borderRadius='999px';
    ap(semTd,sb); ap(tr3,semTd); ap(histTbody,tr3);
  });
  ap(histTbl,histTbody); ap(histWrap,histTbl); ap(histCard,histHd,histWrap);
  ap(div, histCard);
  return div;
}


function render() {
  renderLoading();
  var sidebar = document.getElementById('sidebar');
  var main = document.getElementById('main');
  if (!sidebar || !main) return;
  sidebar.innerHTML = ''; sidebar.appendChild(renderSidebar());
  main.innerHTML = '';
  var content;
  if (S.colabMode) {
    sidebar.innerHTML = ''; sidebar.appendChild(renderColabSidebar());
    if (S.page==='collab_meus_itens') content = pageColabMeusItens();
    else if (S.page==='collab_minha_sprint') content = pageColabMinhaSprint();
    else if (S.page==='collab_desempenho') content = pageColabDesempenho();
    else content = pageColabMeusItens();
  } else if (S.page==='dashboard') content = pageDashboard();
  else if (S.page==='monitoring') content = pageMonitoring();
  else if (S.page==='sprint') content = pageSprint();
  else if (S.page==='collaborator') content = pageCollaborators();
  else if (S.page==='governance') content = pageGovernance();
  else if (S.page==='indicators') content = pageIndicators();
  else content = pageSettings();
  try {
    main.appendChild(content);
  } catch(err) {
    var errDiv = document.createElement('div');
    errDiv.style.cssText = 'padding:32px;color:#ef4444;font-size:14px;';
    errDiv.textContent = '⚠ Erro ao renderizar: ' + err.message;
    main.appendChild(errDiv);
  }
}

// ============================================================
// MODO COLABORADOR — detecção via URL params
// ============================================================
(function() {
  function getUrlParam(name) {
    try { return new URLSearchParams(window.location.search).get(name); } catch(e) { return null; }
  }
  var colabName  = getUrlParam('colaborador');
  var colabToken = getUrlParam('token');
  if (colabName) {
    S.colabMode  = true;
    S.colabName  = decodeURIComponent(colabName);
    S.colabToken = colabToken ? atob(colabToken) : null;
    if (S.colabToken) { S.token = S.colabToken; }
    S.page = 'collab_meus_itens';
  }
})();

// ============================================================
// INIT
// ============================================================
render();
if (S.token) loadData(S.token, false);
